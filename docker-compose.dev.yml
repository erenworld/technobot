services:
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run start:dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules_api:/app/node_modules
    env_file:
      - .env

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - node_modules_web:/app/node_modules
    env_file:
      - .env

volumes:
  node_modules_api:
  node_modules_web:
